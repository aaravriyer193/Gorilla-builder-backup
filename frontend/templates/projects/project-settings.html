<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Project Settings · {{ project.name if project else project_id }} · Gor://a Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>
  :root {
    --bg: #0a0b0d;
    --bg-2: #101114;
    --bg-3: #16181d;
    --fg: #e8e8eb;
    --muted: #8a8c95;
    --dim: #56586a;
    --line: rgba(255,255,255,0.07);
    --line-2: rgba(255,255,255,0.13);
    --line-3: rgba(255,255,255,0.2);
    --accent: oklch(0.74 0.16 248);
    --accent-2: oklch(0.68 0.18 248);
    --accent-dim: oklch(0.4 0.12 252);
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --radius: 6px;
    --radius-sm: 4px;
    --radius-lg: 8px;
  }

  * { box-sizing: border-box; outline: none; }
  ::selection { background: oklch(0.74 0.16 248 / 0.35); color: #fff; }

  body {
    margin: 0; background: var(--bg); color: var(--fg);
    min-height: 100vh; font-weight: 400; position: relative;
    font-family: 'DM Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.005em;
  }

  .horizon {
    position: fixed; left: 0; right: 0;
    top: -30%; height: 70%;
    pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse 50% 70% at 50% 80%,
      oklch(0.55 0.22 248 / 0.28) 0%,
      oklch(0.45 0.2 250 / 0.14) 30%,
      oklch(0.3 0.16 252 / 0.05) 55%,
      transparent 75%);
    filter: blur(40px);
  }

  .wrap {
    max-width: 680px; margin: 0 auto;
    padding: 40px 24px 80px;
    position: relative; z-index: 1;
  }

  /* ── LOGO PILL ── */
  .logo {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 5px 9px 5px 5px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    border-radius: 5px;
    margin-bottom: 28px;
    text-decoration: none;
    transition: all 0.15s ease;
  }
  .logo:hover { background: rgba(255,255,255,0.06); border-color: var(--line-2); }
  .logo-icon {
    width: 20px; height: 20px;
    background: var(--bg-3); border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon svg { width: 12px; height: 12px; fill: var(--fg); }
  .logo-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 12.5px; font-weight: 500;
    color: var(--fg); letter-spacing: -0.01em;
  }

  /* ── TOP HEADER STRIP ── */
  .top {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 20px;
  }
  .title { display: flex; flex-direction: column; gap: 4px; }
  .title .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; color: var(--accent);
    font-weight: 500; letter-spacing: -0.005em;
  }
  .title h1 {
    font-family: 'DM Sans', sans-serif;
    font-size: 28px; margin: 0; font-weight: 500; color: var(--fg);
    letter-spacing: -0.03em; line-height: 1.05;
  }
  .title h1 .accent { color: var(--accent); font-style: italic; font-weight: 500; }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'DM Sans', sans-serif; font-size: 12.5px;
    font-weight: 500; letter-spacing: -0.005em;
    border: 1px solid var(--line-2); background: var(--bg-2);
    color: var(--fg);
    padding: 7px 12px; cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.15s var(--ease-out);
    border-radius: var(--radius-sm);
  }
  .btn:hover { border-color: var(--line-3); background: var(--bg-3); }
  .btn i { font-size: 12px; }

  .btn.primary {
    background: var(--accent); color: #fff; border-color: transparent;
    box-shadow: 0 2px 8px oklch(0.6 0.2 248 / 0.3);
  }
  .btn.primary:hover {
    background: var(--accent-2);
    box-shadow: 0 4px 14px oklch(0.6 0.2 248 / 0.45);
  }

  /* ── ERROR BAR ── */
  .error-bar {
    background: rgba(168, 96, 96, 0.08);
    border: 1px solid rgba(168, 96, 96, 0.22);
    border-left: 2px solid #c08585;
    padding: 12px 14px; margin-bottom: 14px;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; gap: 10px;
  }
  .error-bar i { color: #c08585; font-size: 14px; flex-shrink: 0; }
  .error-bar span {
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: #c08585; line-height: 1.5;
    font-weight: 400; letter-spacing: -0.005em;
  }

  /* ── CARD ── */
  .card {
    background: rgba(16, 17, 20, 0.65);
    backdrop-filter: blur(12px) saturate(140%);
    -webkit-backdrop-filter: blur(12px) saturate(140%);
    border: 1px solid var(--line-2);
    border-radius: var(--radius-lg);
    padding: 28px;
    position: relative;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.04) inset,
      0 12px 40px rgba(0,0,0,0.25);
  }

  .card h2 {
    font-family: 'DM Sans', sans-serif;
    font-size: 11.5px; margin: 0 0 18px;
    color: var(--muted);
    font-weight: 500; letter-spacing: -0.005em;
    padding-bottom: 10px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 6px;
  }
  .card h2::before {
    content: '';
    width: 2px; height: 10px;
    background: var(--accent);
    border-radius: 1px;
  }

  /* ── LABELS ── */
  label {
    font-family: 'DM Sans', sans-serif; font-size: 11.5px;
    color: var(--muted);
    display: block; margin: 18px 0 6px;
    font-weight: 500; letter-spacing: -0.005em;
  }
  label:first-of-type { margin-top: 0; }

  /* ── INPUTS ── */
  input[type="text"], textarea, select {
    width: 100%;
    border: 1px solid var(--line-2);
    background: var(--bg-2);
    color: var(--fg);
    padding: 11px 13px; outline: none;
    font-size: 13.5px; font-weight: 400;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s var(--ease-out);
    border-radius: var(--radius-sm);
    letter-spacing: -0.005em;
  }
  input[type="text"]:focus, textarea:focus, select:focus {
    border-color: var(--line-3);
  }
  input::placeholder, textarea::placeholder { color: var(--dim); }

  /* ── FILE INPUT ── */
  input[type="file"] {
    width: 100%; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 12.5px;
    padding: 6px 0;
    font-weight: 400; letter-spacing: -0.005em;
  }
  input[type="file"]::file-selector-button {
    font-family: 'DM Sans', sans-serif; font-size: 12.5px;
    font-weight: 500; letter-spacing: -0.005em;
    background: var(--bg-2);
    border: 1px solid var(--line-2);
    color: var(--fg);
    padding: 7px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer; margin-right: 12px;
    transition: all 0.15s var(--ease-out);
  }
  input[type="file"]::file-selector-button:hover {
    border-color: var(--line-3);
    background: var(--bg-3);
  }

  textarea { min-height: 100px; resize: vertical; line-height: 1.5; }

  /* ── IMAGE PREVIEW ── */
  .image-preview {
    width: 100%; max-width: 320px; height: auto;
    border: 1px solid var(--line-2);
    border-radius: var(--radius-sm);
    margin-bottom: 12px; display: block;
    background: var(--bg);
    aspect-ratio: 16/9; object-fit: cover;
  }
  .image-preview-empty {
    display: flex; align-items: center; justify-content: center;
    color: var(--dim);
    font-family: 'DM Sans', sans-serif; font-size: 12.5px;
    font-weight: 500; letter-spacing: -0.005em;
    flex-direction: column; gap: 8px;
    border: 1px dashed var(--line-2);
    background: var(--bg-2);
    border-radius: var(--radius-sm);
    width: 100%; max-width: 320px; aspect-ratio: 16/9;
    margin-bottom: 12px;
  }
  .image-preview-empty i { font-size: 28px; opacity: 0.3; }

  /* ── FOOTER ── */
  .footer {
    display: flex; justify-content: flex-end; gap: 10px;
    margin-top: 24px; padding-top: 16px;
    border-top: 1px solid var(--line);
  }

  .small {
    font-family: 'DM Sans', sans-serif; font-size: 12.5px;
    color: var(--muted); line-height: 1.5;
    font-weight: 400; letter-spacing: -0.005em;
  }
</style>
</head>

<body class="{% if user.plan == 'premium' %}premium{% endif %}">

<div class="horizon"></div>

<div class="wrap">

  <a class="logo" href="/dashboard">
    <span class="logo-icon">
      <svg viewBox="0 0 600 550" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(0,603) scale(0.1,-0.1)" stroke="none">

          <path d="M3880 3849 c-190 -17 -341 -86 -488 -224 -112 -104 -200 -249 -239 -395 -25 -92 -25 -339 0 -430 78 -281 316 -519 597 -597 101 -28 339 -25 443 5 152 44 285 128 397 250 146 158 211 332 212 557 0 244 -82 436 -259 606 -181 175 -402 251 -663 228z m213 -324 c282 -73 454 -362 382 -640 -45 -171 -179 -312 -355 -371 -80 -27 -243 -25 -324 5 -202 73 -337 252 -353 466 -17 243 150 475 388 539 71 19 191 20 262 1z"/>
        </g>
      </svg>
    </span>
    <span class="logo-text">gor://a</span>
  </a>

  <div class="top">
    <div class="title">
      <div class="eyebrow">Project settings</div>
      <h1>{{ project.name if project else project_id }} <span class="accent">settings.</span></h1>
    </div>
    <a class="btn" href="/projects/{{ project_id }}/editor">
      <i class="ph-bold ph-arrow-left"></i>
      Editor
    </a>
  </div>

  {% if error %}
  <div class="error-bar">
    <i class="ph-fill ph-warning-circle"></i>
    <span>{{ error }}</span>
  </div>
  {% endif %}

  <form class="card" method="post" action="/projects/{{ project_id }}/settings" enctype="multipart/form-data">
    <h2>General info</h2>

    <label>Project snapshot</label>
    {% if project and project.snapshot_b64 %}
      <img src="{{ project.snapshot_b64 }}" class="image-preview" alt="Project Snapshot" />
    {% else %}
      <div class="image-preview-empty">
        <i class="ph-thin ph-image"></i>
        No image uploaded
      </div>
    {% endif %}
    <input type="file" name="snapshot" accept="image/png, image/jpeg, image/webp" />

    <label>Project name</label>
    <input type="text" name="name" value="{{ project.name if project else '' }}" placeholder="My Awesome App" required />

    <label>Description</label>
    <textarea name="description" placeholder="What does this project do?">{{ project.description if project else '' }}</textarea>

    <div class="footer">
      <a class="btn" href="/projects/{{ project_id }}/editor">Cancel</a>
      <button class="btn primary" type="submit">
        <i class="ph-bold ph-check"></i>
        Save changes →
      </button>
    </div>
  </form>

</div>

</body>
</html>
