<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Project Settings · {{ project.name if project else project_id }} · Gor://a Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>
  :root {
    --bg: #0a0b0d;
    --bg-2: #101114;
    --fg: #e8e8eb;
    --muted: #8a8c95;
    --dim: #4a4c55;
    --faint: #25272d;
    --line: rgba(255,255,255,0.10);
    --line-2: rgba(255,255,255,0.18);
    --blue: oklch(0.74 0.16 248);
    --blue-2: oklch(0.62 0.2 252);
    --blue-dim: oklch(0.4 0.12 252);
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { box-sizing: border-box; outline: none; }

  body {
    margin: 0; background: var(--bg); color: var(--fg);
    min-height: 100vh; font-weight: 300; position: relative;
    font-family: 'DM Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* dot grid */
  body::before {
    content: "";
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }

  .wrap {
    max-width: 680px; margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative; z-index: 1;
  }

  /* ── TOP HEADER STRIP ── */
  .top {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 14px 20px;
    border: 1px solid var(--line);
    background: var(--bg-2);
    margin-bottom: 0;
    position: relative;
  }

  /* corner marks */
  .top::before {
    content: ''; position: absolute; top: 8px; left: 8px;
    width: 8px; height: 8px;
    border-top: 1px solid var(--muted); border-left: 1px solid var(--muted);
    opacity: 0.4; pointer-events: none;
  }

  .title { display: flex; flex-direction: column; gap: 4px; }
  .title h1 {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; margin: 0; font-weight: 500; color: var(--fg);
    letter-spacing: -0.01em;
  }
  .title .sub {
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--dim); font-weight: 400; letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .title .sub::before { content: "// "; color: var(--blue); }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase; font-weight: 400;
    border: 1px solid var(--line); background: rgba(255,255,255,0.03);
    color: var(--muted);
    padding: 8px 14px; cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: 7px;
    transition: all 0.15s var(--ease-out);
  }
  .btn:hover { border-color: var(--line-2); color: var(--fg); background: rgba(255,255,255,0.05); transform: translateY(-1px); }
  .btn:active { transform: translateY(1px); }

  .btn.primary {
    background: var(--blue); color: #fff; border-color: transparent;
  }
  .btn.primary:hover { background: var(--blue-2); border-color: transparent; transform: translateY(-1px); }

  /* ── ERROR CARD ── */
  .error-bar {
    background: rgba(100,20,20,0.06); border: 1px solid rgba(100,20,20,0.2);
    border-left: 2px solid #b05050;
    padding: 12px 16px; margin-top: 0;
    display: flex; align-items: center; gap: 10px;
  }
  .error-bar i { color: #b05050; font-size: 14px; flex-shrink: 0; }
  .error-bar span {
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.06em; color: #c07070; line-height: 1.55;
  }

  /* ── CARD — bento cell ── */
  .card {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-top: none; /* joins flush to the top strip */
    padding: 28px;
    position: relative;
    transition: background 0.2s var(--ease-out);
  }
  .card:hover { background: rgba(255,255,255,0.015); }

  /* bottom-right corner mark */
  .card::after {
    content: ''; position: absolute; bottom: 10px; right: 10px;
    width: 8px; height: 8px;
    border-bottom: 1px solid var(--muted); border-right: 1px solid var(--muted);
    opacity: 0.4; pointer-events: none;
  }

  .card h2 {
    font-family: 'DM Mono', monospace;
    font-size: 10px; margin: 0 0 22px; color: var(--blue);
    font-weight: 400; text-transform: uppercase; letter-spacing: 0.2em;
    padding-bottom: 12px; border-bottom: 1px solid var(--line);
  }
  .card h2::before { content: "// "; color: var(--dim); }

  /* ── LABELS ── */
  label {
    font-family: 'DM Mono', monospace; font-size: 10px; color: var(--dim);
    display: block; margin: 20px 0 8px; font-weight: 400;
    text-transform: uppercase; letter-spacing: 0.18em;
  }
  label:first-of-type { margin-top: 0; }

  /* ── INPUTS ── */
  input[type="text"], textarea, select {
    width: 100%; border: 1px solid var(--line);
    background: var(--bg); color: var(--fg);
    padding: 11px 14px; outline: none;
    font-size: 14px; font-weight: 300;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s var(--ease-out);
  }
  input[type="text"]:focus, textarea:focus, select:focus {
    border-color: var(--line-2); box-shadow: 0 0 0 3px rgba(255,255,255,0.03);
  }
  input::placeholder, textarea::placeholder { color: var(--dim); }

  /* ── FILE INPUT ── */
  input[type="file"] {
    width: 100%; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.06em; padding: 8px 0;
  }
  input[type="file"]::file-selector-button {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase; font-weight: 400;
    background: rgba(255,255,255,0.03); border: 1px solid var(--line);
    color: var(--muted); padding: 7px 12px;
    cursor: pointer; margin-right: 12px;
    transition: all 0.15s var(--ease-out);
  }
  input[type="file"]::file-selector-button:hover {
    border-color: var(--line-2); background: rgba(255,255,255,0.05); color: var(--fg);
  }

  textarea { min-height: 110px; resize: vertical; line-height: 1.55; }

  /* ── IMAGE PREVIEW ── */
  .image-preview {
    width: 100%; max-width: 300px; height: auto;
    border: 1px solid var(--line);
    margin-bottom: 12px; display: block;
    background: var(--bg);
    aspect-ratio: 16/9; object-fit: cover;
  }
  .image-preview-empty {
    display: flex; align-items: center; justify-content: center;
    color: var(--dim);
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 0.16em; text-transform: uppercase;
    flex-direction: column; gap: 8px;
    border: 1px solid var(--line); background: var(--bg);
    width: 100%; max-width: 300px; aspect-ratio: 16/9;
    margin-bottom: 12px;
  }
  .image-preview-empty i { font-size: 24px; opacity: 0.2; }

  /* ── FOOTER ── */
  .footer {
    display: flex; justify-content: flex-end; gap: 10px;
    margin-top: 24px; padding-top: 16px;
    border-top: 1px solid var(--line);
  }

  .small {
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.06em; color: var(--muted); line-height: 1.6;
  }
</style>
</head>

<body class="{% if user.plan == 'premium' %}premium{% endif %}">

<div class="wrap">

  <div class="top">
    <div class="title">
      <h1>Project Settings</h1>
      <div class="sub">{{ project_id }}</div>
    </div>
    <div style="display:flex;gap:8px;">
      <a class="btn" href="/projects/{{ project_id }}/editor">
        <i class="ph-bold ph-arrow-left" style="font-size:12px;"></i>
        Back to Editor
      </a>
    </div>
  </div>

  {% if error %}
  <div class="error-bar">
    <i class="ph-fill ph-warning-circle"></i>
    <span>{{ error }}</span>
  </div>
  {% endif %}

  <form class="card" method="post" action="/projects/{{ project_id }}/settings" enctype="multipart/form-data">
    <h2>General Info</h2>

    <label>Project Snapshot</label>
    {% if project and project.snapshot_b64 %}
      <img src="{{ project.snapshot_b64 }}" class="image-preview" alt="Project Snapshot" />
    {% else %}
      <div class="image-preview image-preview-empty">
        <i class="ph-thin ph-image"></i>
        No image uploaded
      </div>
    {% endif %}
    <input type="file" name="snapshot" accept="image/png, image/jpeg, image/webp" />

    <label>Project Name</label>
    <input type="text" name="name" value="{{ project.name if project else '' }}" placeholder="My Awesome App" required />

    <label>Description</label>
    <textarea name="description" placeholder="What does this project do?">{{ project.description if project else '' }}</textarea>

    <div class="footer">
      <a class="btn" href="/projects/{{ project_id }}/editor">Cancel</a>
      <button class="btn primary" type="submit">
        <i class="ph-bold ph-check" style="font-size:12px;"></i>
        Save Changes →
      </button>
    </div>
  </form>

</div>

</body>
</html>
