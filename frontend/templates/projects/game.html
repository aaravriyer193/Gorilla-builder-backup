<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>GORILLA RUN — Game Boy Edition</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --c0: #0a1c3a;
    --c1: #2a5088;
    --c2: #6ea0d4;
    --c3: #c8e0f8;
    --case-light: #d6d2c2;
    --case-mid:   #b8b3a0;
    --case-dark:  #8a8675;
    --case-shadow:#5e5b50;
    --bezel-dark: #2a3340;
    --bezel-mid:  #4a5560;
    --btn-blue:   #3a5878;
    --btn-blue-dk:#1f3a5a;
    --btn-blue-lt:#6a92b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'VT323', monospace;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  body {
    background:
      radial-gradient(ellipse at 30% 20%, #142848 0%, transparent 40%),
      radial-gradient(ellipse at 70% 80%, #0a1830 0%, transparent 50%),
      radial-gradient(ellipse at center, #050b18 0%, #000 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px;
  }

  .page-title {
    position: fixed;
    top: 12px;
    left: 0; right: 0;
    text-align: center;
    z-index: 5;
    pointer-events: none;
  }
  .page-title h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(13px, 3vw, 20px);
    color: var(--c3);
    letter-spacing: 4px;
    text-shadow:
      0 0 12px rgba(168,200,236,0.5),
      2px 2px 0 var(--c1),
      4px 4px 0 var(--c0);
    margin-bottom: 3px;
  }
  .page-title .sub {
    font-family: 'VT323', monospace;
    font-size: clamp(10px, 1.8vw, 13px);
    color: var(--c2);
    letter-spacing: 6px;
    opacity: 0.85;
  }

  .gameboy-wrap {
    position: relative;
    width: min(94vw, 420px);
    aspect-ratio: 9 / 14.5;
    perspective: 1200px;
    margin-top: 50px;
  }
  .gameboy {
    position: absolute;
    inset: 0;
    border-radius: 14px 14px 38px 14px;
    background:
      linear-gradient(135deg,
        rgba(255,255,255,0.25) 0%,
        rgba(255,255,255,0) 25%,
        rgba(0,0,0,0) 75%,
        rgba(0,0,0,0.25) 100%),
      linear-gradient(160deg,
        var(--case-light) 0%,
        var(--case-mid) 50%,
        var(--case-dark) 100%);
    box-shadow:
      0 30px 60px rgba(0,0,0,0.7),
      0 12px 25px rgba(0,0,0,0.5),
      0 0 0 1px rgba(0,0,0,0.4),
      inset 0 2px 1px rgba(255,255,255,0.5),
      inset 0 -3px 6px rgba(0,0,0,0.3),
      inset 3px 0 8px rgba(255,255,255,0.15),
      inset -3px 0 8px rgba(0,0,0,0.2);
    padding: 4% 6% 3%;
    display: flex;
    flex-direction: column;
    animation: gbFloat 5s ease-in-out infinite;
  }
  @keyframes gbFloat {
    0%, 100% { transform: translateY(0) rotateX(2deg) rotateY(-3deg); }
    50%      { transform: translateY(-6px) rotateX(-1deg) rotateY(3deg); }
  }

  /* Screen well — now bigger */
  .screen-well {
    position: relative;
    width: 100%;
    aspect-ratio: 10 / 9;
    border-radius: 10px;
    margin-top: 2%;
    background: linear-gradient(160deg, var(--bezel-mid), var(--bezel-dark));
    box-shadow:
      inset 0 3px 6px rgba(0,0,0,0.7),
      inset 0 -1px 1px rgba(255,255,255,0.1),
      0 1px 0 rgba(255,255,255,0.4);
    padding: 7% 6%;
    display: flex;
    flex-direction: column;
  }

  /* Top decorative line */
  .well-line {
    position: absolute;
    top: 4%;
    left: 12%;
    right: 12%;
    height: 1px;
    background: rgba(0,0,0,0.4);
    box-shadow: 0 1px 0 rgba(255,255,255,0.08);
  }

  /* Power LED — REPOSITIONED to top-left of bezel, NOT overlapping screen */
  .power-area {
    position: absolute;
    top: 8%;
    left: 6%;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 6px;
  }
  .power-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }
  .led {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ff8899, #d11020 60%, #4a0808 100%);
    box-shadow:
      0 0 6px rgba(255,40,60,0.9),
      inset 0 1px 1px rgba(255,255,255,0.4),
      inset 0 -1px 1px rgba(0,0,0,0.3);
    animation: ledPulse 2s ease-in-out infinite;
  }
  @keyframes ledPulse {
    0%, 100% { box-shadow: 0 0 6px rgba(255,40,60,0.9), inset 0 1px 1px rgba(255,255,255,0.4); }
    50%      { box-shadow: 0 0 14px rgba(255,80,100,1), inset 0 1px 1px rgba(255,255,255,0.4); }
  }

  /* Screen */
  .screen {
    flex: 1;
    margin-top: 16%;
    border-radius: 4px;
    background: #0d2348;
    box-shadow:
      inset 0 1px 2px rgba(0,0,0,0.6),
      0 1px 0 rgba(255,255,255,0.1);
    overflow: hidden;
    position: relative;
    image-rendering: pixelated;
  }
  .screen canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }
  /* Subtler scanlines */
  .screen::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 3px,
      rgba(0,0,0,0.1) 3px,
      rgba(0,0,0,0.1) 4px
    );
    pointer-events: none;
    z-index: 2;
  }
  /* Lighter vignette */
  .screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 70%, rgba(0,0,0,0.25) 100%);
    pointer-events: none;
    z-index: 3;
  }

  .brand-stripe {
    margin-top: 2%;
    text-align: center;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(7px, 1.6vw, 10px);
    color: var(--btn-blue);
    letter-spacing: 1px;
    text-shadow: 1px 1px 0 rgba(255,255,255,0.4);
  }
  .brand-stripe .sub {
    font-family: 'VT323', monospace;
    font-size: clamp(10px, 2vw, 13px);
    color: var(--case-shadow);
    letter-spacing: 2px;
    margin-top: 2px;
    font-style: italic;
  }

  .gb-seam {
    position: absolute;
    top: 18%;
    left: 4%; right: 4%;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(0,0,0,0.3), transparent);
    box-shadow: 0 1px 0 rgba(255,255,255,0.3);
  }

  .controls {
    flex: 1;
    position: relative;
    margin-top: 3%;
    min-height: 100px;
  }

  .dpad {
    position: absolute;
    left: 4%;
    top: 8%;
    width: 36%;
    aspect-ratio: 1;
    background: radial-gradient(circle at 35% 35%,
      rgba(0,0,0,0.05) 0%,
      rgba(0,0,0,0.18) 60%,
      rgba(0,0,0,0.25) 100%);
    border-radius: 50%;
  }
  .dpad-cross { position: absolute; inset: 8%; }
  .dpad-h, .dpad-v {
    position: absolute;
    background: linear-gradient(160deg, #2a2f3a, #0a0d12 70%);
    box-shadow:
      inset 0 2px 1px rgba(255,255,255,0.15),
      inset 0 -2px 2px rgba(0,0,0,0.4),
      0 2px 4px rgba(0,0,0,0.4),
      0 1px 0 rgba(255,255,255,0.1);
    border-radius: 4px;
  }
  .dpad-h { width: 100%; height: 32%; top: 34%; left: 0; }
  .dpad-v { width: 32%; height: 100%; left: 34%; top: 0; }
  .dpad-center {
    position: absolute;
    width: 12%;
    aspect-ratio: 1;
    left: 44%;
    top: 44%;
    background: radial-gradient(circle, rgba(0,0,0,0.5), rgba(0,0,0,0.2));
    border-radius: 50%;
  }
  .dpad-arrows { position: absolute; inset: 0; pointer-events: none; }
  .dpad-arrow {
    position: absolute;
    width: 0; height: 0;
    border-style: solid;
    opacity: 0.5;
  }
  .dpad-arrow.up    { top: 4%;  left: 50%; transform: translateX(-50%); border-width: 0 4px 5px 4px; border-color: transparent transparent rgba(255,255,255,0.6) transparent; }
  .dpad-arrow.down  { bottom:4%; left: 50%; transform: translateX(-50%); border-width: 5px 4px 0 4px; border-color: rgba(255,255,255,0.6) transparent transparent transparent; }
  .dpad-arrow.left  { left: 4%;  top: 50%; transform: translateY(-50%); border-width: 4px 5px 4px 0; border-color: transparent rgba(255,255,255,0.6) transparent transparent; }
  .dpad-arrow.right { right:4%; top: 50%; transform: translateY(-50%); border-width: 4px 0 4px 5px; border-color: transparent transparent transparent rgba(255,255,255,0.6); }

  .ab-area {
    position: absolute;
    right: 4%;
    top: 4%;
    width: 44%;
    aspect-ratio: 1;
    transform: rotate(-15deg);
  }
  .ab-btn {
    position: absolute;
    width: 36%;
    aspect-ratio: 1;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%,
      var(--btn-blue-lt) 0%,
      var(--btn-blue) 45%,
      var(--btn-blue-dk) 100%);
    box-shadow:
      0 4px 6px rgba(0,0,0,0.4),
      inset 0 2px 2px rgba(255,255,255,0.25),
      inset 0 -3px 4px rgba(0,0,0,0.4),
      0 0 0 4px rgba(0,0,0,0.15);
    cursor: pointer;
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .ab-btn:active {
    transform: translateY(2px);
    box-shadow:
      0 1px 2px rgba(0,0,0,0.4),
      inset 0 2px 2px rgba(255,255,255,0.25),
      inset 0 -2px 3px rgba(0,0,0,0.4);
  }
  .ab-btn.a { right: 6%; top: 18%; }
  .ab-btn.b { right: 42%; top: 38%; }
  .ab-label {
    position: absolute;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(8px, 1.8vw, 11px);
    color: var(--btn-blue);
    font-style: italic;
    transform: rotate(15deg);
    text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
  }
  .ab-label.a { right: 16%; top: 60%; }
  .ab-label.b { right: 52%; top: 80%; }

  .ss-area {
    position: absolute;
    bottom: 14%;
    left: 50%;
    transform: translateX(-50%) rotate(-15deg);
    display: flex;
    gap: 14%;
    align-items: center;
  }
  .ss-btn {
    width: clamp(32px, 8vw, 46px);
    height: clamp(8px, 1.8vw, 11px);
    border-radius: 6px;
    background: linear-gradient(160deg, #8a8a95, #4a4d55);
    box-shadow:
      inset 0 1px 1px rgba(255,255,255,0.4),
      inset 0 -1px 1px rgba(0,0,0,0.4),
      0 2px 3px rgba(0,0,0,0.3);
    cursor: pointer;
  }
  .ss-btn:active {
    transform: translateY(1px);
  }

  .speaker {
    position: absolute;
    right: 6%;
    bottom: 6%;
    width: 26%;
    aspect-ratio: 1.4;
    transform: rotate(-15deg);
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    padding: 8%;
  }
  .speaker-line {
    height: 8%;
    background: linear-gradient(to bottom,
      rgba(0,0,0,0.45) 0%,
      rgba(0,0,0,0.25) 50%,
      rgba(255,255,255,0.15) 100%);
    border-radius: 2px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.2);
  }

  #tap-hint {
    position: fixed;
    bottom: 8px; left: 0; right: 0;
    text-align: center;
    color: var(--c2);
    font-family: 'VT323', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    pointer-events: none;
    opacity: 0.85;
    z-index: 10;
  }
  @keyframes blink { 0%,100%{opacity:0.3} 50%{opacity:0.95} }
  #tap-hint .blink { animation: blink 1.2s step-end infinite; }
</style>
</head>
<body>

<div class="page-title">
  <h1>Play While You Wait</h1>
  <div class="sub">◆ GORILLA RUN - GAME BOY EDITION ◆</div>
</div>

<div class="gameboy-wrap">
  <div class="gameboy">
    <div class="screen-well">
      <div class="well-line"></div>
      <div class="power-area">
        <div class="led"></div>
        <span class="power-label">POWER</span>
      </div>
      <div class="screen">
        <canvas id="game" width="320" height="288"></canvas>
      </div>
    </div>

    <div class="brand-stripe">
      GORILLA RUN
      <div class="sub">— Waiting Room —</div>
    </div>

    <div class="gb-seam"></div>

    <div class="controls">
      <div class="dpad" id="dpad">
        <div class="dpad-cross">
          <div class="dpad-v"></div>
          <div class="dpad-h"></div>
          <div class="dpad-arrows">
            <div class="dpad-arrow up"></div>
            <div class="dpad-arrow down"></div>
            <div class="dpad-arrow left"></div>
            <div class="dpad-arrow right"></div>
          </div>
          <div class="dpad-center"></div>
        </div>
      </div>

      <div class="ab-area">
        <div class="ab-btn a" id="btn-a"></div>
        <div class="ab-label a">A</div>
        <div class="ab-btn b" id="btn-b"></div>
        <div class="ab-label b">B</div>
      </div>

      <div class="ss-area">
        <div style="position:relative;">
          <div class="ss-btn" id="btn-select"></div>
          <div style="position:absolute;top:130%;left:50%;transform:translateX(-50%);font-family:'Press Start 2P',monospace;font-size:6px;color:var(--btn-blue);text-shadow:1px 1px 0 rgba(255,255,255,0.3);">SELECT</div>
        </div>
        <div style="position:relative;">
          <div class="ss-btn" id="btn-start"></div>
          <div style="position:absolute;top:130%;left:50%;transform:translateX(-50%);font-family:'Press Start 2P',monospace;font-size:6px;color:var(--btn-blue);text-shadow:1px 1px 0 rgba(255,255,255,0.3);">START</div>
        </div>
      </div>

      <div class="speaker">
        <div class="speaker-line"></div>
        <div class="speaker-line"></div>
        <div class="speaker-line"></div>
        <div class="speaker-line"></div>
        <div class="speaker-line"></div>
        <div class="speaker-line"></div>
      </div>
    </div>
  </div>
</div>

<div id="tap-hint"><span class="blink">◆ TAP / SPACE / A TO PLAY ◆</span></div>

<script>
/* ═══════════════════════════════════════════════════════════
   GORILLA RUN — pure 2D
   Brighter blue palette + side-view gorilla
   ═══════════════════════════════════════════════════════════ */
const PAL = {
  c0: '#0a1c3a',
  c1: '#2a5088',
  c2: '#6ea0d4',
  c3: '#c8e0f8'
};
const SCREEN_BG_TOP = '#0d2348';
const SCREEN_BG_BOT = '#1a3868';

const SW = 320, SH = 288;
const canvas = document.getElementById('game');
const gctx = canvas.getContext('2d');
gctx.imageSmoothingEnabled = false;

// AUDIO
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){
    try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){}
  }
  if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
}
function tone(freq, dur, type='square', vol=0.05){
  if(!audioCtx) return;
  try {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e){}
}
const sfx = {
  jump:  ()=>{ tone(660,.08,'square',.05); setTimeout(()=>tone(880,.06,'square',.04),40); },
  hit:   ()=>{ tone(180,.15,'sawtooth',.07); setTimeout(()=>tone(90,.25,'sawtooth',.06),80); },
  point: ()=>tone(1200,.05,'square',.03),
  start: ()=>{ tone(523,.1); setTimeout(()=>tone(659,.1),80); setTimeout(()=>tone(784,.15),160); }
};

// MUSIC
let musicPlaying = false;
let musicTimers = [];
const MELODY = [
  [523,1],[659,1],[784,1],[1047,1],[988,1],[784,1],[659,2],
  [587,1],[698,1],[880,1],[1047,1],[988,1],[698,1],[587,2],
  [523,1],[659,1],[784,1],[1047,1],[1175,2],[988,2],
  [880,1],[784,1],[659,1],[587,1],[523,4]
];
const BASS = [
  [131,2],[131,2],[165,2],[131,2],
  [147,2],[147,2],[175,2],[147,2],
  [131,2],[131,2],[196,2],[196,2],
  [165,2],[147,2],[131,4]
];
function startMusic(){
  if(musicPlaying || !audioCtx) return;
  musicPlaying = true;
  const beat = 60/132;
  function melodyLoop(){
    if(!musicPlaying) return;
    let cum = 0;
    MELODY.forEach(([f,b])=>{
      const id = setTimeout(()=>{ if(musicPlaying) tone(f, beat*b*0.85, 'square', 0.022); }, cum*beat*1000);
      musicTimers.push(id);
      cum += b;
    });
    musicTimers.push(setTimeout(melodyLoop, cum*beat*1000));
  }
  function bassLoop(){
    if(!musicPlaying) return;
    let cum = 0;
    BASS.forEach(([f,b])=>{
      const id = setTimeout(()=>{ if(musicPlaying) tone(f, beat*b*0.9, 'triangle', 0.035); }, cum*beat*1000);
      musicTimers.push(id);
      cum += b;
    });
    musicTimers.push(setTimeout(bassLoop, cum*beat*1000));
  }
  melodyLoop();
  bassLoop();
}
function stopMusic(){
  musicPlaying = false;
  musicTimers.forEach(t=>clearTimeout(t));
  musicTimers = [];
}

// GAME STATE
const STATE = { TITLE:0, RUNNING:1, OVER:2 };
let gameState = STATE.TITLE;

const GROUND_Y = 230;
const GORILLA_X = 50;
const GRAVITY = 0.7;
const JUMP_VEL = -13;
const DUCK_FALL = 1.6;

let player = {
  x: GORILLA_X, y: GROUND_Y - 40,
  vy: 0, jumping: false, ducking: false
};

let obstacles = [], clouds = [], mountains = [], stars = [];
let score = 0;
let highScore = parseInt(localStorage.getItem('gb_dino_blue_hs')||'0');
let speed = 5;
let groundOffset = 0;
let frameCount = 0;
let spawnTimer = 60;
let flashTimer = 0;
let titlePulse = 0;

function initBg(){
  clouds = [];
  for(let i=0;i<5;i++){
    clouds.push({ x: Math.random()*SW, y: 30+Math.random()*60, spd: 0.3+Math.random()*0.4 });
  }
  mountains = [];
  for(let i=0;i<6;i++){
    mountains.push({ x: i*70, y: 180, w: 80+Math.random()*40, h: 50+Math.random()*30 });
  }
  stars = [];
  for(let i=0;i<35;i++){
    stars.push({ x: Math.random()*SW, y: Math.random()*150, t: Math.random()*Math.PI*2, b: 0.3+Math.random()*0.7 });
  }
}
initBg();

function px(x,y,w,h,c){ gctx.fillStyle = c; gctx.fillRect(Math.floor(x),Math.floor(y),w,h); }

function drawBg(){
  const grd = gctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grd.addColorStop(0, '#0a1c3a');
  grd.addColorStop(1, '#1a3868');
  gctx.fillStyle = grd;
  gctx.fillRect(0, 0, SW, GROUND_Y);

  stars.forEach(s=>{
    s.t += 0.03;
    const a = (0.5 + 0.5*Math.sin(s.t)) * s.b;
    if(a > 0.4){
      gctx.fillStyle = `rgba(200,224,248,${a})`;
      gctx.fillRect(Math.floor(s.x), Math.floor(s.y), 1, 1);
    }
  });

  clouds.forEach(c=>{
    if(gameState === STATE.RUNNING) c.x -= c.spd;
    if(c.x < -40) c.x = SW + 20;
    drawCloud(Math.floor(c.x), Math.floor(c.y));
  });

  mountains.forEach(m=>{
    if(gameState === STATE.RUNNING) m.x -= speed * 0.15;
    if(m.x < -m.w) m.x = SW;
    drawMountain(Math.floor(m.x), m.y, m.w, m.h);
  });
}

function drawCloud(x,y){
  px(x+4, y, 12, 2, PAL.c2);
  px(x, y+2, 20, 2, PAL.c2);
  px(x-2, y+4, 24, 2, PAL.c2);
  px(x, y+6, 20, 2, PAL.c2);
  px(x+4, y+2, 12, 4, PAL.c1);
}

function drawMountain(x,y,w,h){
  const peak = x + w/2;
  for(let i=0;i<h;i++){
    const ww = Math.floor(w * (1 - i/h));
    px(peak - ww/2, y - i, ww, 1, i < h*0.3 ? PAL.c1 : '#0d1f3a');
  }
  const capH = Math.floor(h*0.2);
  for(let i=0;i<capH;i++){
    const ww = Math.floor(w * (1 - (h-capH+i)/h) * 0.5);
    px(peak - ww/2, y - h + i + capH, ww, 1, PAL.c2);
  }
}

function drawGround(){
  px(0, GROUND_Y, SW, 2, PAL.c2);
  const off = Math.floor(groundOffset) % 16;
  for(let x = -off; x < SW; x += 16){
    px(x, GROUND_Y+3, 8, 1, PAL.c1);
    px(x+10, GROUND_Y+5, 4, 1, PAL.c1);
    px(x+4, GROUND_Y+7, 6, 1, PAL.c2);
    px(x+12, GROUND_Y+9, 3, 1, PAL.c1);
  }
  px(0, GROUND_Y+12, SW, SH-GROUND_Y-12, '#081730');
}

/* ═══════════════════════════════════════════════════════════
   GORILLA — SIDE VIEW (facing right, like Chrome dino)
   42 wide × 40 tall — running, jumping, ducking, dead
   ═══════════════════════════════════════════════════════════ */
function drawGorilla(x, y, state){
  const C0 = PAL.c0, C1 = PAL.c1, C2 = PAL.c2, C3 = PAL.c3;

  if(state === 'duck1' || state === 'duck2'){
    // Ducking gorilla — long body, head forward, knuckle-walking
    // 48 wide × 22 tall
    const dy = y + 18;

    // Shadow
    px(x+4, dy+22, 40, 1, C0);

    // Tail/back lump
    px(x, dy+4, 8, 8, C1);
    px(x+1, dy+5, 6, 6, C2);

    // Body (long, low to ground)
    px(x+6, dy+2, 28, 14, C1);
    px(x+8, dy, 24, 18, C1);

    // Back highlight
    px(x+10, dy+2, 18, 4, C2);

    // Head extending forward (right side)
    px(x+30, dy+2, 14, 12, C1);
    px(x+32, dy, 10, 14, C1);

    // Brow (heavy)
    px(x+34, dy+3, 8, 2, C0);

    // Eye (looking forward)
    px(x+38, dy+5, 2, 2, C0);
    px(x+39, dy+5, 1, 1, C3);

    // Snout/mouth
    px(x+40, dy+8, 4, 3, C0);
    px(x+41, dy+10, 2, 1, C2);

    // Nostril
    px(x+42, dy+8, 1, 1, C2);

    // Front leg/arm (knuckle on ground)
    if(state === 'duck1'){
      px(x+30, dy+14, 5, 8, C0);
      px(x+28, dy+20, 8, 2, C0);
    } else {
      px(x+32, dy+14, 5, 8, C0);
      px(x+30, dy+20, 8, 2, C0);
    }

    // Back leg
    if(state === 'duck1'){
      px(x+10, dy+14, 5, 8, C0);
      px(x+8, dy+20, 8, 2, C0);
    } else {
      px(x+12, dy+14, 5, 8, C0);
      px(x+10, dy+20, 8, 2, C0);
    }

    return;
  }

  // === STANDARD STANDING/RUNNING (side view, facing right) ===
  // 36 wide × 44 tall

  // Shadow
  if(state !== 'jump') px(x+4, y+42, 30, 1, C0);

  // === LEGS (animated) ===
  if(state === 'run1'){
    // Left leg forward (visible), right leg back
    // Front leg bent forward
    px(x+10, y+30, 6, 10, C0);  // thigh
    px(x+8, y+36, 8, 4, C0);    // foot forward
    // Back leg trailing
    px(x+18, y+32, 5, 8, C0);
    px(x+16, y+38, 8, 2, C0);
  } else if(state === 'run2'){
    // Right leg forward, left leg back
    px(x+18, y+30, 6, 10, C0);
    px(x+16, y+36, 8, 4, C0);
    px(x+10, y+32, 5, 8, C0);
    px(x+8, y+38, 8, 2, C0);
  } else if(state === 'jump'){
    // Both legs tucked
    px(x+10, y+28, 6, 8, C0);
    px(x+18, y+28, 6, 8, C0);
    px(x+8, y+34, 8, 4, C0);
    px(x+16, y+34, 8, 4, C0);
  } else { // idle
    px(x+10, y+30, 6, 12, C0);
    px(x+18, y+30, 6, 12, C0);
    px(x+8, y+40, 8, 2, C0);
    px(x+16, y+40, 8, 2, C0);
  }

  // === BODY (torso, side profile) ===
  // Hunched gorilla shape — wider at shoulders, narrower at waist
  px(x+8, y+16, 18, 16, C1);    // main torso
  px(x+6, y+18, 22, 12, C1);    // shoulders wide
  px(x+10, y+14, 14, 4, C1);    // upper back

  // Chest highlight (catch light from front)
  px(x+18, y+20, 6, 8, C2);
  px(x+20, y+22, 4, 4, C3);     // bright chest spot

  // Back curve (darker)
  px(x+8, y+18, 4, 10, C0);

  // === ARMS ===
  // Side view: front arm visible, back arm partially hidden
  if(state === 'jump'){
    // Arms up/forward
    px(x+24, y+14, 6, 10, C1);  // front arm raised
    px(x+28, y+18, 4, 6, C1);   // hand
    px(x+4, y+18, 6, 10, C1);   // back arm
  } else if(state === 'run1'){
    // Front arm back, back arm forward
    px(x+22, y+20, 6, 12, C1);
    px(x+24, y+30, 5, 4, C0);   // fist
    px(x+4, y+18, 6, 8, C1);
  } else if(state === 'run2'){
    // Front arm forward, back arm back
    px(x+24, y+18, 6, 10, C1);
    px(x+28, y+24, 5, 4, C0);   // fist forward
    px(x+4, y+22, 5, 10, C1);
  } else { // idle
    px(x+24, y+18, 6, 14, C1);
    px(x+4, y+18, 5, 14, C1);
  }

  // === HEAD (side profile, facing right) ===
  // Sloped/sagittal crest at top
  px(x+10, y+4, 14, 12, C1);    // main head
  px(x+12, y+2, 10, 14, C1);    // top of head
  px(x+14, y, 6, 16, C1);       // crown peak

  // Forward (right side) — protruding face/snout
  px(x+22, y+6, 8, 10, C1);     // jaw forward
  px(x+24, y+8, 8, 8, C1);      // snout extends right
  px(x+30, y+10, 2, 6, C1);     // nose tip

  // Back of head
  px(x+8, y+8, 4, 6, C1);

  // === FACE DETAILS (side view) ===
  // Heavy brow ridge
  px(x+18, y+8, 12, 2, C0);
  px(x+24, y+9, 6, 2, C0);

  // Eye (facing right, only one visible from side)
  px(x+24, y+10, 2, 2, C0);
  px(x+25, y+10, 1, 1, C3);

  // Snout/mouth area (dark)
  px(x+24, y+12, 8, 4, C0);
  px(x+26, y+13, 2, 1, C2);     // nostril
  if(state === 'dead'){
    // X eye
    px(x+24, y+10, 1, 1, C3);
    px(x+25, y+11, 1, 1, C3);
  } else {
    px(x+27, y+14, 3, 1, C2);   // mouth line
  }

  // Ear (small, on visible side)
  px(x+12, y+10, 2, 3, C0);

  // Cheek shadow
  px(x+20, y+12, 3, 3, C0);
}

function spawnObstacle(){
  const r = Math.random();
  let type;
  if(score < 200){
    type = r < 0.7 ? 'cactus_s' : 'cactus_l';
  } else if(score < 500){
    type = r < 0.4 ? 'cactus_s' : r < 0.75 ? 'cactus_l' : r < 0.9 ? 'cactus_g' : 'bird';
  } else {
    type = r < 0.3 ? 'cactus_s' : r < 0.55 ? 'cactus_l' : r < 0.75 ? 'cactus_g' : 'bird';
  }
  let w, h, y;
  if(type === 'cactus_s'){ w=12; h=22; y=GROUND_Y - h; }
  else if(type === 'cactus_l'){ w=16; h=32; y=GROUND_Y - h; }
  else if(type === 'cactus_g'){ w=32; h=28; y=GROUND_Y - h; }
  else if(type === 'bird'){
    w=28; h=18;
    const alt = Math.random();
    y = alt < 0.5 ? GROUND_Y - 26 : alt < 0.85 ? GROUND_Y - 46 : GROUND_Y - 66;
  }
  obstacles.push({ x: SW + 10, y, w, h, type, animFrame: 0 });
}

function drawObstacle(o){
  const x = Math.floor(o.x), y = Math.floor(o.y);
  if(o.type === 'cactus_s'){
    px(x+4, y+4, 4, 18, PAL.c1);
    px(x+2, y+10, 8, 4, PAL.c1);
    px(x+5, y+2, 2, 20, PAL.c2);
    px(x, y+12, 2, 2, PAL.c1);
    px(x+10, y+12, 2, 2, PAL.c1);
  } else if(o.type === 'cactus_l'){
    px(x+6, y+2, 4, 30, PAL.c1);
    px(x+2, y+10, 12, 6, PAL.c1);
    px(x+7, y, 2, 30, PAL.c2);
    px(x, y+12, 4, 4, PAL.c1);
    px(x+12, y+14, 4, 4, PAL.c1);
  } else if(o.type === 'cactus_g'){
    px(x+1, y+8, 4, 20, PAL.c1);
    px(x+2, y+6, 2, 22, PAL.c2);
    px(x+12, y+2, 4, 26, PAL.c1);
    px(x+13, y, 2, 28, PAL.c2);
    px(x+9, y+12, 8, 6, PAL.c1);
    px(x+24, y+10, 4, 18, PAL.c1);
    px(x+25, y+8, 2, 20, PAL.c2);
  } else if(o.type === 'bird'){
    const flap = o.animFrame % 30 < 15;
    px(x+10, y+8, 14, 6, PAL.c1);
    px(x+22, y+5, 7, 6, PAL.c1);
    px(x+26, y+6, 4, 2, PAL.c0);   // beak
    px(x+24, y+7, 1, 1, PAL.c3);   // eye
    px(x+4, y+9, 6, 4, PAL.c1);    // tail
    if(flap){
      px(x+12, y, 10, 2, PAL.c2);
      px(x+14, y+2, 8, 3, PAL.c2);
      px(x+16, y+5, 4, 3, PAL.c1);
    } else {
      px(x+12, y+12, 10, 4, PAL.c2);
      px(x+14, y+16, 8, 2, PAL.c2);
    }
  }
}

function getHitbox(o){
  if(o.type === 'bird'){
    return { x: o.x+4, y: o.y+2, w: o.w-6, h: o.h-4 };
  }
  return { x: o.x+2, y: o.y+2, w: o.w-4, h: o.h-3 };
}

function getPlayerHitbox(){
  if(player.ducking && !player.jumping){
    return { x: player.x+4, y: player.y+22, w: 36, h: 18 };
  }
  return { x: player.x+6, y: player.y+4, w: 26, h: 38 };
}

function aabb(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function drawHud(){
  gctx.font = '8px "Press Start 2P", monospace';
  gctx.textBaseline = 'top';
  gctx.textAlign = 'left';
  gctx.fillStyle = PAL.c2;
  gctx.fillText('HI '+String(highScore).padStart(5,'0'), SW-150, 8);
  gctx.fillStyle = PAL.c3;
  gctx.fillText(String(Math.floor(score)).padStart(5,'0'), SW-50, 8);
}

function drawTitle(){
  titlePulse += 0.04;
  const titleY = 60 + Math.sin(titlePulse)*3;

  gctx.textAlign = 'center';
  gctx.fillStyle = PAL.c1;
  gctx.font = '24px "Press Start 2P", monospace';
  gctx.fillText('GORILLA', SW/2+2, titleY+2);
  gctx.fillText('RUN!', SW/2+2, titleY+30+2);
  gctx.fillStyle = PAL.c3;
  gctx.fillText('GORILLA', SW/2, titleY);
  gctx.fillText('RUN!', SW/2, titleY+30);

  // Mini gorilla running
  const tFrame = Math.floor(frameCount / 8) % 2;
  drawGorilla(SW/2 - 18, 130, tFrame === 0 ? 'run1' : 'run2');

  // Cactus zooming past
  const cx = SW/2 + 50 - (frameCount*2.5 % 100);
  if(cx > -20){
    px(cx+4, 158, 4, 18, PAL.c1);
    px(cx+2, 164, 8, 4, PAL.c1);
    px(cx+5, 156, 2, 20, PAL.c2);
  }

  gctx.fillStyle = PAL.c2;
  gctx.font = '8px "Press Start 2P", monospace';
  gctx.fillText('GAME BOY EDITION', SW/2, 195);

  if(Math.floor(frameCount/30) % 2 === 0){
    gctx.fillStyle = PAL.c3;
    gctx.fillText('PRESS  START', SW/2, 220);
  }

  gctx.fillStyle = PAL.c2;
  gctx.fillText('HI  '+String(highScore).padStart(5,'0'), SW/2, 250);
  gctx.textAlign = 'left';
}

function drawGameOver(){
  gctx.fillStyle = 'rgba(10,28,58,0.65)';
  gctx.fillRect(0, 90, SW, 120);

  gctx.textAlign = 'center';
  gctx.fillStyle = PAL.c3;
  gctx.font = '16px "Press Start 2P", monospace';
  gctx.fillText('G A M E', SW/2, 110);
  gctx.fillText('O V E R', SW/2, 135);

  gctx.font = '8px "Press Start 2P", monospace';
  gctx.fillStyle = PAL.c3;
  gctx.fillText('SCORE  '+String(Math.floor(score)).padStart(5,'0'), SW/2, 165);
  gctx.fillStyle = PAL.c2;
  gctx.fillText('HI     '+String(highScore).padStart(5,'0'), SW/2, 180);

  if(Math.floor(frameCount/30) % 2 === 0){
    gctx.fillStyle = PAL.c3;
    gctx.fillText('TAP TO RETRY', SW/2, 205);
  }
  gctx.textAlign = 'left';
}

function update(){
  frameCount++;

  if(gameState !== STATE.RUNNING) return;

  speed = Math.min(13, 5 + score * 0.003);
  groundOffset += speed;

  if(player.jumping){
    const grav = (keys.down || touchDown) ? GRAVITY * DUCK_FALL : GRAVITY;
    player.vy += grav;
    player.y += player.vy;
    if(player.y >= GROUND_Y - 40){
      player.y = GROUND_Y - 40;
      player.vy = 0;
      player.jumping = false;
    }
  }

  spawnTimer--;
  if(spawnTimer <= 0){
    spawnObstacle();
    const minGap = Math.max(40, 90 - score*0.04);
    spawnTimer = minGap + Math.random() * 50;
  }

  for(let i = obstacles.length-1; i >= 0; i--){
    const o = obstacles[i];
    o.x -= speed;
    o.animFrame++;
    if(o.x + o.w < -10){ obstacles.splice(i, 1); continue; }
    if(aabb(getHitbox(o), getPlayerHitbox())){
      gameOver();
      return;
    }
  }

  const prev = Math.floor(score);
  score += 0.15 * (speed/5);
  if(Math.floor(score) > prev && Math.floor(score) % 100 === 0){
    sfx.point();
    flashTimer = 6;
  }
  if(flashTimer > 0) flashTimer--;
}

function gameOver(){
  gameState = STATE.OVER;
  sfx.hit();
  if(score > highScore){
    highScore = Math.floor(score);
    localStorage.setItem('gb_dino_blue_hs', highScore);
  }
  setTimeout(()=>{ if(gameState === STATE.OVER) startMusic(); }, 800);
}

function draw(){
  drawBg();
  drawGround();

  if(gameState === STATE.TITLE){
    drawTitle();
  } else {
    obstacles.forEach(drawObstacle);

    let pState = 'run1';
    if(gameState === STATE.OVER) pState = 'dead';
    else if(player.jumping) pState = 'jump';
    else if(player.ducking) pState = (Math.floor(frameCount/6) % 2 === 0) ? 'duck1' : 'duck2';
    else pState = (Math.floor(frameCount/6) % 2 === 0) ? 'run1' : 'run2';
    drawGorilla(player.x, player.y, pState);

    drawHud();
    if(gameState === STATE.OVER) drawGameOver();

    if(flashTimer > 0 && flashTimer % 2 === 0){
      gctx.fillStyle = 'rgba(200,224,248,0.15)';
      gctx.fillRect(0,0,SW,SH);
    }
  }
}

const keys = { up:false, down:false };
let touchDown = false;

function actionPress(){
  ensureAudio();
  if(gameState === STATE.TITLE){ startGame(); return; }
  if(gameState === STATE.OVER){ startGame(); return; }
  if(!player.jumping){
    player.vy = JUMP_VEL;
    player.jumping = true;
    player.ducking = false;
    sfx.jump();
  }
}

function duckPress(){
  if(gameState !== STATE.RUNNING) return;
  if(player.jumping){
    if(player.vy < 0) player.vy = 2;
    else player.vy += 5;
  } else {
    player.ducking = true;
  }
}
function duckRelease(){ player.ducking = false; }

function startGame(){
  ensureAudio();
  stopMusic();
  gameState = STATE.RUNNING;
  obstacles = [];
  score = 0;
  speed = 5;
  spawnTimer = 60;
  player.x = GORILLA_X;
  player.y = GROUND_Y - 40;
  player.vy = 0;
  player.jumping = false;
  player.ducking = false;
  sfx.start();
  const hint = document.getElementById('tap-hint');
  if(hint) hint.style.display = 'none';
}

window.addEventListener('keydown', e=>{
  if(e.repeat) return;
  if(e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'KeyZ' || e.code === 'KeyX'){
    e.preventDefault(); keys.up = true; actionPress();
  } else if(e.code === 'ArrowDown' || e.code === 'KeyS'){
    e.preventDefault(); keys.down = true; duckPress();
  } else if(e.code === 'Enter'){
    e.preventDefault(); actionPress();
  }
});
window.addEventListener('keyup', e=>{
  if(e.code === 'ArrowDown' || e.code === 'KeyS'){
    keys.down = false; duckRelease();
  } else if(e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'KeyZ' || e.code === 'KeyX'){
    keys.up = false;
  }
});

const screenEl = document.querySelector('.screen');
function handlePress(clientY){
  ensureAudio();
  const rect = screenEl.getBoundingClientRect();
  if(clientY > rect.top + rect.height * 0.6 && gameState === STATE.RUNNING){
    touchDown = true;
    duckPress();
  } else {
    actionPress();
  }
}

function bindBtn(el, onDown, onUp){
  el.addEventListener('touchstart', e=>{ e.preventDefault(); ensureAudio(); onDown(); }, {passive:false});
  el.addEventListener('touchend', e=>{ e.preventDefault(); if(onUp) onUp(); }, {passive:false});
  el.addEventListener('mousedown', e=>{ e.preventDefault(); ensureAudio(); onDown(); });
  el.addEventListener('mouseup', e=>{ e.preventDefault(); if(onUp) onUp(); });
  el.addEventListener('mouseleave', e=>{ if(onUp) onUp(); });
}

bindBtn(document.getElementById('btn-a'), actionPress);
bindBtn(document.getElementById('btn-b'), actionPress);
bindBtn(document.getElementById('btn-start'), actionPress);
bindBtn(document.getElementById('btn-select'), ()=>{});

const dpadEl = document.getElementById('dpad');
dpadEl.addEventListener('touchstart', e=>{
  e.preventDefault();
  ensureAudio();
  const t = e.touches[0];
  const rect = dpadEl.getBoundingClientRect();
  const cy = t.clientY - rect.top;
  if(cy > rect.height * 0.6){
    touchDown = true; duckPress();
  } else {
    actionPress();
  }
}, {passive:false});
dpadEl.addEventListener('touchend', e=>{
  e.preventDefault(); touchDown = false; duckRelease();
}, {passive:false});
dpadEl.addEventListener('mousedown', e=>{
  ensureAudio();
  const rect = dpadEl.getBoundingClientRect();
  const cy = e.clientY - rect.top;
  if(cy > rect.height * 0.6){
    touchDown = true; duckPress();
  } else {
    actionPress();
  }
});
dpadEl.addEventListener('mouseup', ()=>{ touchDown = false; duckRelease(); });

screenEl.addEventListener('touchstart', e=>{
  e.preventDefault();
  ensureAudio();
  const t = e.touches[0];
  handlePress(t.clientY);
}, {passive:false});
screenEl.addEventListener('touchend', e=>{
  e.preventDefault(); touchDown = false; duckRelease();
}, {passive:false});
screenEl.addEventListener('mousedown', e=>{
  ensureAudio();
  handlePress(e.clientY);
});
screenEl.addEventListener('mouseup', ()=>{ touchDown = false; duckRelease(); });

document.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});

let musicStarted = false;
function tryStartMusic(){
  if(musicStarted) return;
  ensureAudio();
  if(audioCtx){
    musicStarted = true;
    setTimeout(()=>{ if(gameState === STATE.TITLE) startMusic(); }, 200);
  }
}
window.addEventListener('pointerdown', tryStartMusic, {once:true});
window.addEventListener('keydown', tryStartMusic, {once:true});
window.addEventListener('touchstart', tryStartMusic, {once:true});

function tick(){
  update();
  draw();
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
