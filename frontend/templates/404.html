<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>404 · Gor://a</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    :root {
      --bg: #0a0b0d;
      --bg-2: #101114;
      --fg: #e8e8eb;
      --muted: #8a8c95;
      --dim: #4a4c55;
      --faint: #25272d;
      --line: rgba(255,255,255,0.10);
      --line-2: rgba(255,255,255,0.18);
      --blue: oklch(0.74 0.16 248);
      --blue-2: oklch(0.62 0.2 252);
      --blue-dim: oklch(0.4 0.12 252);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; outline: none; margin: 0; padding: 0; }

    body {
      background: var(--bg); color: var(--fg);
      height: 100vh; display: flex; overflow: hidden;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-weight: 300; -webkit-font-smoothing: antialiased;
    }

    /* dot grid */
    body::before {
      content: "";
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      position: relative; z-index: 1;
      padding: 40px; text-align: center;
    }

    /* ASCII-window wrapper for the 404 content */
    .window-404 {
      position: relative;
      border: 3px double rgba(255,255,255,0.22);
      background: var(--bg);
      padding: 64px 80px 56px;
      display: flex; flex-direction: column; align-items: center;
      animation: fadeUp 0.6s var(--ease-out) both;
    }

    .w-chrome {
      position: absolute; top: -10px; left: 14px;
      background: var(--bg); padding: 0 8px;
      font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted);
    }
    .w-title {
      position: absolute; top: -11px; left: 50%; transform: translateX(-50%);
      background: var(--bg); padding: 0 14px;
      font-family: 'DM Mono', monospace; font-size: 11px;
      letter-spacing: 0.2em; color: var(--fg);
      text-transform: uppercase; white-space: nowrap;
    }

    /* ── BIG 404 ── */
    .four-oh-four {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(80px, 14vw, 160px);
      font-weight: 500;
      letter-spacing: -0.05em;
      color: var(--fg);
      line-height: 1;
      position: relative; z-index: 1;
      animation: fadeUp 0.6s var(--ease-out) 0.05s both;
    }
    .four-oh-four .accent { color: var(--blue); font-style: italic; font-weight: 400; }

    /* dim big text watermark behind */
    .four-oh-four::before {
      content: "404";
      position: absolute; inset: 0;
      font-size: inherit; font-weight: 700; letter-spacing: inherit;
      color: var(--faint); z-index: -1;
      transform: translate(3px, 3px);
      pointer-events: none;
    }

    /* ── DIVIDER ── */
    .rule {
      width: 40px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--line-2), transparent);
      margin: 28px auto;
      position: relative; z-index: 1;
      animation: fadeUp 0.6s var(--ease-out) 0.12s both;
    }

    /* ── COPY ── */
    .eyebrow {
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--blue);
      margin-bottom: 10px;
      animation: fadeUp 0.6s var(--ease-out) 0.15s both;
    }
    .eyebrow::before { content: "// "; color: var(--dim); }

    .headline {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(20px, 2.5vw, 28px); font-weight: 400;
      letter-spacing: -0.02em; color: var(--fg); line-height: 1.05;
      animation: fadeUp 0.6s var(--ease-out) 0.18s both;
    }
    .headline .accent { color: var(--blue); font-style: italic; font-weight: 400; }

    .sub {
      font-family: 'DM Mono', monospace; font-size: 11px;
      letter-spacing: 0.1em; color: var(--muted);
      margin-top: 8px; line-height: 1.65;
      animation: fadeUp 0.6s var(--ease-out) 0.22s both;
    }

    /* ── BUTTONS ── */
    .actions {
      display: flex; gap: 8px;
      margin-top: 36px;
      animation: fadeUp 0.6s var(--ease-out) 0.28s both;
    }

    .btn-primary {
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
      background: var(--blue); color: #fff;
      padding: 10px 18px; border: none; cursor: pointer;
      transition: all 0.15s var(--ease-out);
      display: inline-flex; align-items: center; gap: 7px;
      text-decoration: none; font-weight: 400;
    }
    .btn-primary:hover { background: var(--blue-2); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(1px); }

    .btn-secondary {
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      background: transparent; color: var(--muted);
      padding: 10px 18px; border: 1px solid var(--line);
      cursor: pointer; transition: all 0.15s var(--ease-out);
      display: inline-flex; align-items: center; gap: 7px;
      text-decoration: none; font-weight: 400;
    }
    .btn-secondary:hover { border-color: var(--line-2); color: var(--fg); background: rgba(255,255,255,0.03); transform: translateY(-1px); }
    .btn-secondary:active { transform: translateY(1px); }

    /* ── LOGO bottom ── */
    .logo-mark {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500; letter-spacing: -0.02em;
      color: var(--dim); text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
      transition: color 0.15s;
    }
    .logo-mark .proto { color: var(--blue-dim); }
    .logo-mark:hover { color: var(--fg); }
    .logo-mark:hover .proto { color: var(--blue); }

    .logo-icon { width: 14px; height: 14px; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 14px; height: 14px; fill: currentColor; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <main>
    <div class="window-404">
      <span class="w-chrome">≡ ×</span>
      <span class="w-title">[ ERROR / NOT FOUND ]</span>

      <div class="four-oh-four"><span class="accent">4</span>0<span class="accent">4</span></div>

      <div class="rule"></div>

      <div class="eyebrow">Page not found</div>
      <h1 class="headline">This page doesn't<br/><span class="accent">exist.</span></h1>
      <p class="sub">It was moved, deleted, or never existed in the first place.</p>

      <div class="actions">
        <a class="btn-primary" href="/dashboard">
          <i class="ph ph-squares-four" style="font-size:13px;"></i>
          Back to Dashboard →
        </a>
        <a class="btn-secondary" href="javascript:history.back()">

          Go Back

    </div>

      </span>
      gor://a

  </main>

</body>
