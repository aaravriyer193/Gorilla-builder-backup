<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>App Authentication · Gor://a</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0b0d;
      --bg-2: #101114;
      --bg-3: #16181d;
      --fg: #e8e8eb;
      --muted: #8a8c95;
      --dim: #56586a;
      --line: rgba(255,255,255,0.07);
      --line-2: rgba(255,255,255,0.13);
      --line-3: rgba(255,255,255,0.2);
      --accent: oklch(0.74 0.16 248);
      --accent-2: oklch(0.68 0.18 248);
      --accent-dim: oklch(0.4 0.12 252);
      --accent-glow: oklch(0.62 0.2 252);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; outline: none; }
    ::selection { background: oklch(0.74 0.16 248 / 0.35); color: #fff; }

    body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--fg);
      height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.005em;
      position: relative;
      overflow: hidden;
    }

    /* atmospheric horizon glow centered behind card */
    .horizon {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 50% 60% at 50% 60%,
          oklch(0.55 0.22 248 / 0.32) 0%,
          oklch(0.45 0.2 250 / 0.16) 28%,
          oklch(0.3 0.16 252 / 0.06) 52%,
          transparent 75%);
      filter: blur(40px);
    }

    /* ── CARD ── */
    .auth-card {
      position: relative;
      z-index: 1;
      background: rgba(16, 17, 20, 0.7);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      border: 1px solid var(--line-2);
      border-radius: 8px;
      width: 100%;
      max-width: 380px;
      padding: 36px 32px 28px;
      text-align: center;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.04) inset,
        0 20px 60px rgba(0,0,0,0.45),
        0 0 80px oklch(0.6 0.2 248 / 0.08);
      animation: cardIn 0.5s var(--ease-out) forwards;
      opacity: 0;
      transform: translateY(8px);
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── LOGO ── */
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 9px 5px 5px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
      border-radius: 5px;
      margin-bottom: 24px;
      text-decoration: none;
      transition: all 0.15s ease;
    }
    .logo:hover { background: rgba(255,255,255,0.06); border-color: var(--line-2); }
    .logo-icon {
      width: 20px; height: 20px;
      background: var(--bg-3);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-icon svg { width: 12px; height: 12px; fill: var(--fg); }
    .logo-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--fg);
      letter-spacing: -0.01em;
    }

    /* ── EYEBROW ── */
    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 11.5px;
      color: var(--accent);
      margin-bottom: 8px;
      font-weight: 500;
      letter-spacing: -0.005em;
    }

    h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 26px;
      font-weight: 500;
      letter-spacing: -0.03em;
      margin: 0 0 8px;
      color: var(--fg);
      line-height: 1.05;
    }
    h1 .accent {
      color: var(--accent);
      font-style: italic;
      font-weight: 500;
    }

    p.sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--muted);
      margin: 0 0 24px;
      line-height: 1.55;
      font-weight: 400;
      letter-spacing: -0.005em;
    }
    p.sub strong {
      color: var(--fg);
      font-weight: 500;
    }

    /* ── OAUTH BUTTONS ── */
    .oauth-group { display: flex; flex-direction: column; gap: 7px; }

    .btn-oauth {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--line-2);
      background: rgba(255,255,255,0.03);
      color: var(--fg);
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      cursor: pointer;
      transition: all 0.15s var(--ease-out);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-weight: 500;
      letter-spacing: -0.005em;
      border-radius: 5px;
    }
    .btn-oauth:hover { background: rgba(255,255,255,0.06); border-color: var(--line-3); }

    /* ── SUCCESS STATE ── */
    .success-wrap { display: flex; flex-direction: column; align-items: center; gap: 0; }

    /* loader */
    .loader {
      width: 28px; height: 28px;
      border: 2px solid var(--line-2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 18px;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* pulse dot for connected state */
    .pulse-row {
      display: flex; align-items: center; gap: 7px; justify-content: center;
      margin-bottom: 14px;
    }
    .pulse-dot {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.75); }
    }
    .pulse-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11.5px;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: -0.005em;
    }

    /* divider */
    .divider {
      height: 1px;
      background: var(--line);
      margin: 24px 0;
      width: 100%;
    }

    /* bottom powered-by */
    .powered {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      color: var(--dim);
      margin-top: 22px;
      letter-spacing: -0.005em;
      font-weight: 400;
    }
    .powered strong { color: var(--muted); font-weight: 500; }
    .powered .dot { color: var(--dim); margin: 0 6px; }
  </style>
</head>
<body>

  <div class="horizon"></div>

  <div class="auth-card">

    {% if step == 'success' %}

        <a href="/" class="logo">

              </g>
            </svg>
          </span>
          <span class="logo-text">gor://a</span>
        </a>

        <div class="divider"></div>

        <div class="loader"></div>

        <div class="pulse-row">
          <span class="pulse-dot"></span>
          <span class="pulse-label">Securely connected</span>
        </div>

        <h1>Auth <span class="accent">complete.</span></h1>
        <p class="sub">Returning you to the application…</p>
      </div>

      <script>
        const userData = {{ user_data | safe }};
        if (window.opener) {
          window.opener.postMessage({ type: 'GORILLA_AUTH_SUCCESS', payload: userData }, '*');
          setTimeout(() => window.close(), 500);
        } else {
          document.querySelector('.sub').innerText = "Authentication successful. You can close this window.";
        }
      </script>

            </g>
          </svg>
        </span>
        <span class="logo-text">gor://a</span>
      </a>

      <div class="eyebrow">App authentication</div>
      <h1>Sign <span class="accent">in.</span></h1>
      <p class="sub">Log in to continue using <strong>{{ project_name }}</strong></p>

      <div class="oauth-group">
        <button class="btn-oauth" onclick="window.location.href='/api/v1/app-auth/{{ auth_id }}/google'">
          <svg width="14" height="14" viewBox="0 0 24 24">

</html>
